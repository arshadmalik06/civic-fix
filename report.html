<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Issue Reporter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">UrbanEye</span>
            <button class="btn btn-outline-light btn-sm">Admin Login</button>
        </div>
    </nav>

    <div class="container-fluid h-100">
        <div class="row h-100">
            
            <div class="col-md-4 p-4 shadow-sm form-container">
                <h3>Report an Issue</h3>
                <p class="text-muted">Help us keep the city clean and safe.</p>
                
                <form id="reportForm">
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select class="form-select" id="category" required>
                            <option value="">Select an issue...</option>
                            <option value="pothole">Pothole / Road Damage</option>
                            <option value="garbage">Illegal Dumping / Garbage</option>
                            <option value="streetlight">Broken Streetlight</option>
                            <option value="water">Water Leakage</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="description" rows="3" placeholder="Briefly describe the issue..." required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <button type="button" id="getLocationBtn" class="btn btn-secondary w-100 mb-2"> Use My Current Location</button>
                        <small id="locationStatus" class="form-text text-success d-none">Location captured successfully!</small>
                        <input type="hidden" id="latitude">
                        <input type="hidden" id="longitude">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Photo (Optional)</label>
                        <input class="form-control" type="file" id="photo" accept="image/*">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Submit Report</button>
                </form>
            </div>

            <div class="col-md-8 p-0">
                <div id="map"></div>
            </div>
            
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
